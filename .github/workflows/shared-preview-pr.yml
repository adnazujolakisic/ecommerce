name: Shared Preview (PR)

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]

concurrency:
  group: shared-preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  PREVIEW_KEY: pr-${{ github.event.pull_request.number }}
  MIRRORD_CONFIG: .mirrord/experiment.json
  PREVIEW_NAMESPACE: ${{ vars.PREVIEW_NAMESPACE }}
  PREVIEW_REGISTRY: ${{ vars.PREVIEW_REGISTRY }}
  PREVIEW_IMAGE_NAMESPACE: ${{ vars.PREVIEW_IMAGE_NAMESPACE }}
  PREVIEW_TTL_MINUTES: ${{ vars.PREVIEW_TTL_MINUTES }}
  PREVIEW_TIMEOUT_SECONDS: ${{ vars.PREVIEW_TIMEOUT_SECONDS }}

jobs:
  detect-changes:
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    outputs:
      matrix_json: ${{ steps.matrix.outputs.matrix_json }}
      has_changes: ${{ steps.matrix.outputs.has_changes }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect changed services
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            catalogue:
              - "services/catalogue/**"
            inventory:
              - "services/inventory/**"
            checkout:
              - "services/checkout/**"
            order:
              - "services/order/**"
            order-processor:
              - "services/order-processor/**"
            frontend:
              - "frontend/**"
            visualization-frontend:
              - "visualization/**"
            visualization-backend:
              - "visualization-backend/**"

      - name: Build preview matrix for changed services
        id: matrix
        run: |
          matrix='{"include":[]}'

          add_service() {
            local service="$1"
            local target="$2"
            local context="$3"
            local dockerfile="$4"
            local config_file="$5"

            matrix="$(jq -c \
              --arg service "$service" \
              --arg target "$target" \
              --arg context "$context" \
              --arg dockerfile "$dockerfile" \
              --arg config_file "$config_file" \
              '.include += [{
                "service": $service,
                "target": $target,
                "context": $context,
                "dockerfile": $dockerfile,
                "config_file": $config_file
              }]' <<<"$matrix")"
          }

          [ "${{ steps.filter.outputs.catalogue }}" = "true" ] && add_service "catalogue" "deployment/catalogue" "services/catalogue" "services/catalogue/Dockerfile" ".mirrord/experiment.json"
          [ "${{ steps.filter.outputs.inventory }}" = "true" ] && add_service "inventory" "deployment/inventory" "services/inventory" "services/inventory/Dockerfile" ".mirrord/experiment.json"
          [ "${{ steps.filter.outputs.order }}" = "true" ] && add_service "order" "deployment/order" "services/order" "services/order/Dockerfile" ".mirrord/experiment.json"
          [ "${{ steps.filter.outputs['visualization-backend'] }}" = "true" ] && add_service "visualization-backend" "deployment/visualization-backend" "visualization-backend" "visualization-backend/Dockerfile" ".mirrord/experiment.json"

          [ "${{ steps.filter.outputs.checkout }}" = "true" ] && add_service "checkout" "deployment/checkout" "services/checkout" "services/checkout/Dockerfile" ".mirrord/experiment-no-db.json"
          [ "${{ steps.filter.outputs['order-processor'] }}" = "true" ] && add_service "order-processor" "deployment/order-processor" "services/order-processor" "services/order-processor/Dockerfile" ".mirrord/experiment-no-db.json"
          [ "${{ steps.filter.outputs.frontend }}" = "true" ] && add_service "frontend" "deployment/frontend" "frontend" "frontend/Dockerfile" ".mirrord/experiment-no-db.json"
          [ "${{ steps.filter.outputs['visualization-frontend'] }}" = "true" ] && add_service "visualization-frontend" "deployment/visualization-frontend" "visualization" "visualization/Dockerfile" ".mirrord/experiment-no-db.json"

          has_changes="$(jq -r '.include | length > 0' <<<"$matrix")"
          echo "matrix_json=$matrix" >> "$GITHUB_OUTPUT"
          echo "has_changes=$has_changes" >> "$GITHUB_OUTPUT"
          echo "Preview matrix: $matrix"

  build-and-start-preview:
    if: github.event.action != 'closed' && needs.detect-changes.outputs.has_changes == 'true'
    needs: detect-changes
    runs-on: ubuntu-latest
    env:
      GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.detect-changes.outputs.matrix_json) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify required cluster secret
        env:
          KUBECONFIG_B64: ${{ secrets.KUBECONFIG_B64 }}
        run: |
          if [ -z "$KUBECONFIG_B64" ]; then
            echo "Missing required secret: KUBECONFIG_B64"
            exit 1
          fi

      - name: Configure kubeconfig
        env:
          KUBECONFIG_B64: ${{ secrets.KUBECONFIG_B64 }}
        run: |
          mkdir -p "$HOME/.kube"
          echo "$KUBECONFIG_B64" | base64 --decode > "$HOME/.kube/config"
          chmod 600 "$HOME/.kube/config"

      - name: Install Kubernetes auth helpers
        run: |
          sudo apt-get update
          sudo apt-get install -y jq curl unzip

          # Azure exec auth helper often used in kubeconfig.
          KUBELOGIN_VERSION="v0.0.37"
          curl -fsSL "https://github.com/Azure/kubelogin/releases/download/${KUBELOGIN_VERSION}/kubelogin-linux-amd64.zip" -o kubelogin.zip
          unzip -q kubelogin.zip
          sudo mv bin/linux_amd64/kubelogin /usr/local/bin/kubelogin
          rm -rf kubelogin.zip bin

          # AWS exec auth helper.
          curl -fsSL "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o awscliv2.zip
          unzip -q awscliv2.zip
          sudo ./aws/install --bin-dir /usr/local/bin --install-dir /usr/local/aws-cli --update
          rm -rf aws awscliv2.zip

      - name: Install gcloud and GKE auth plugin (optional)
        if: env.GCP_SA_KEY != ''
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ env.GCP_SA_KEY }}

      - name: Set up gcloud (optional)
        if: env.GCP_SA_KEY != ''
        uses: google-github-actions/setup-gcloud@v2

      - name: Install gke-gcloud-auth-plugin (optional)
        if: env.GCP_SA_KEY != ''
        run: gcloud components install gke-gcloud-auth-plugin --quiet

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: "latest"

      - name: Normalize kubeconfig exec command paths
        run: |
          tmp_cfg="$RUNNER_TEMP/kubeconfig.json"
          kubectl config view --raw -o json > "$tmp_cfg"

          while IFS= read -r cmd; do
            [ -z "$cmd" ] && continue
            if [[ "$cmd" = /* ]] && [ ! -x "$cmd" ]; then
              base="$(basename "$cmd")"
              if command -v "$base" >/dev/null 2>&1; then
                echo "Rewriting missing absolute auth command: $cmd -> $base"
                jq --arg old "$cmd" --arg new "$base" \
                  '(.users[]?.user.exec.command |= if . == $old then $new else . end)' \
                  "$tmp_cfg" > "$tmp_cfg.new"
                mv "$tmp_cfg.new" "$tmp_cfg"
              fi
            fi
          done < <(jq -r '.users[]?.user.exec.command // empty' "$tmp_cfg" | sort -u)

          cp "$tmp_cfg" "$HOME/.kube/config"

      - name: Validate cluster auth command availability
        run: |
          exec_cmds="$(jq -r '.users[]?.user.exec.command // empty' "$HOME/.kube/config" | sort -u)"
          if [ -z "$exec_cmds" ]; then
            echo "No exec auth command found in kubeconfig (token/cert auth likely in use)."
          else
            echo "Kubeconfig exec commands:"
            echo "$exec_cmds"
            while IFS= read -r cmd; do
              [ -z "$cmd" ] && continue
              if command -v "$cmd" >/dev/null 2>&1; then
                echo "Found auth command: $cmd"
              elif [ -x "$cmd" ]; then
                echo "Found auth command by absolute path: $cmd"
              else
                echo "Missing kubeconfig auth command: $cmd"
                exit 1
              fi
            done <<< "$exec_cmds"
          fi

      - name: Validate kubectl access before preview
        run: |
          kubectl version --client
          kubectl get ns "${PREVIEW_NAMESPACE:-metalmart}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Resolve preview image URI
        id: image
        run: |
          registry="${PREVIEW_REGISTRY:-ghcr.io}"
          namespace="${PREVIEW_IMAGE_NAMESPACE:-${GITHUB_REPOSITORY_OWNER}/ecommerce-preview}"
          namespace="$(echo "$namespace" | tr '[:upper:]' '[:lower:]')"
          tag="pr-${{ github.event.pull_request.number }}-${GITHUB_SHA::7}"
          image_uri="${registry}/${namespace}/${{ matrix.service }}:${tag}"

          echo "registry=$registry" >> "$GITHUB_OUTPUT"
          echo "uri=$image_uri" >> "$GITHUB_OUTPUT"
          echo "Preview image: $image_uri"

      - name: Login to GHCR
        if: steps.image.outputs.registry == 'ghcr.io'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Verify custom registry credentials
        if: steps.image.outputs.registry != 'ghcr.io'
        env:
          PREVIEW_REGISTRY_USERNAME: ${{ secrets.PREVIEW_REGISTRY_USERNAME }}
          PREVIEW_REGISTRY_PASSWORD: ${{ secrets.PREVIEW_REGISTRY_PASSWORD }}
        run: |
          if [ -z "$PREVIEW_REGISTRY_USERNAME" ] || [ -z "$PREVIEW_REGISTRY_PASSWORD" ]; then
            echo "Set PREVIEW_REGISTRY_USERNAME and PREVIEW_REGISTRY_PASSWORD secrets for custom registries."
            exit 1
          fi

      - name: Login to custom registry
        if: steps.image.outputs.registry != 'ghcr.io'
        uses: docker/login-action@v3
        with:
          registry: ${{ steps.image.outputs.registry }}
          username: ${{ secrets.PREVIEW_REGISTRY_USERNAME }}
          password: ${{ secrets.PREVIEW_REGISTRY_PASSWORD }}

      - name: Build and push preview image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.image.outputs.uri }}

      - name: Install mirrord
        run: |
          curl -fsSL https://raw.githubusercontent.com/metalbear-co/mirrord/main/scripts/install.sh | bash
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Verify mirrord config
        run: mirrord verify-config "${{ matrix.config_file }}"

      - name: Start or update preview target
        env:
          MIRRORD_CI_API_KEY: ${{ secrets.MIRRORD_CI_API_KEY }}
        run: |
          namespace="${PREVIEW_NAMESPACE:-metalmart}"
          ttl="${PREVIEW_TTL_MINUTES:-120}"
          timeout="${PREVIEW_TIMEOUT_SECONDS:-600}"

          if ! mirrord preview start \
            --key "$PREVIEW_KEY" \
            --target "${{ matrix.target }}" \
            --target-namespace "$namespace" \
            --image "${{ steps.image.outputs.uri }}" \
            --ttl "$ttl" \
            --timeout "$timeout" \
            -f "${{ matrix.config_file }}"; then
            echo "Preview start failed; collecting diagnostics..."
            mirrord operator status || true
            mirrord preview status --key "$PREVIEW_KEY" --namespace "$namespace" || true
            kubectl get pods -n "$namespace" | rg -i "mirrord|preview|${{ matrix.service }}" || true
            exit 1
          fi

  stop-preview-on-close:
    if: github.event.action == 'closed'
    runs-on: ubuntu-latest
    env:
      GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify required cluster secret
        env:
          KUBECONFIG_B64: ${{ secrets.KUBECONFIG_B64 }}
        run: |
          if [ -z "$KUBECONFIG_B64" ]; then
            echo "Missing required secret: KUBECONFIG_B64"
            exit 1
          fi

      - name: Configure kubeconfig
        env:
          KUBECONFIG_B64: ${{ secrets.KUBECONFIG_B64 }}
        run: |
          mkdir -p "$HOME/.kube"
          echo "$KUBECONFIG_B64" | base64 --decode > "$HOME/.kube/config"
          chmod 600 "$HOME/.kube/config"

      - name: Install Kubernetes auth helpers
        run: |
          sudo apt-get update
          sudo apt-get install -y jq curl unzip

          KUBELOGIN_VERSION="v0.0.37"
          curl -fsSL "https://github.com/Azure/kubelogin/releases/download/${KUBELOGIN_VERSION}/kubelogin-linux-amd64.zip" -o kubelogin.zip
          unzip -q kubelogin.zip
          sudo mv bin/linux_amd64/kubelogin /usr/local/bin/kubelogin
          rm -rf kubelogin.zip bin

          curl -fsSL "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o awscliv2.zip
          unzip -q awscliv2.zip
          sudo ./aws/install --bin-dir /usr/local/bin --install-dir /usr/local/aws-cli --update
          rm -rf aws awscliv2.zip

      - name: Install gcloud and GKE auth plugin (optional)
        if: env.GCP_SA_KEY != ''
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ env.GCP_SA_KEY }}

      - name: Set up gcloud (optional)
        if: env.GCP_SA_KEY != ''
        uses: google-github-actions/setup-gcloud@v2

      - name: Install gke-gcloud-auth-plugin (optional)
        if: env.GCP_SA_KEY != ''
        run: gcloud components install gke-gcloud-auth-plugin --quiet

      - name: Install mirrord
        run: |
          curl -fsSL https://raw.githubusercontent.com/metalbear-co/mirrord/main/scripts/install.sh | bash
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Stop shared preview environment
        env:
          MIRRORD_CI_API_KEY: ${{ secrets.MIRRORD_CI_API_KEY }}
        run: |
          namespace="${PREVIEW_NAMESPACE:-metalmart}"
          mirrord preview stop \
            --key "$PREVIEW_KEY" \
            --namespace "$namespace" \
            -f "$MIRRORD_CONFIG"
